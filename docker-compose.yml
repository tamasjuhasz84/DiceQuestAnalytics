services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database and make story/i18n files editable at runtime
      - ./data:/app/data
    environment:
      ALLOWED_ORIGINS: "http://localhost:8501,http://127.0.0.1:8501"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      # Use the Docker service name as hostname inside the compose network
      API_BASE_URL: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
