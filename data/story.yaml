id: dicequest_black_tower
version: 0.1.0
start_scene: intro_01
default_language: hu
supported_languages:
  - hu
  - en

scenes:
  intro_01:
    type: normal
    title_key: intro_01.title
    text_key: intro_01.text
    analytics:
      tag: intro
      difficulty: 1
    choices:
      - id: enter_gate
        label_key: choice.enter_gate
        next_scene: intro_02
      - id: go_around
        label_key: choice.go_around
        next_scene: intro_03
      - id: leave
        label_key: choice.leave
        next_scene: death_coward

  intro_02:
    type: normal
    title_key: intro_02.title
    text_key: intro_02.text
    analytics:
      tag: decision
      difficulty: 1
    choices:
      - id: take_stairs
        label_key: choice.take_stairs
        next_scene: intro_05
      - id: dark_corridor
        label_key: choice.dark_corridor
        next_scene: str_01

  intro_03:
    type: dice_check
    title_key: intro_03.title
    text_key: intro_03.text
    dice_check:
      dice: d20
      success_threshold: 11
      success_scene: luck_01
      fail_scene: death_trap_01
      reason: hidden_pit
    analytics:
      tag: dice
      difficulty: 2

  intro_04:
    type: skill_check
    title_key: intro_04.title
    text_key: intro_04.text
